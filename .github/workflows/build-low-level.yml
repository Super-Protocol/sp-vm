name: Build low-level components

on:
  workflow_dispatch:
    inputs:
      runs-on:
        required: true
        type: choice
        description: GitHub runner for build
        options:
          - self-hosted
          - sp-vm-runner-2
          - ubuntu-latest

permissions:
  contents: write

jobs:
  build-low-level:
    runs-on: ${{ inputs.runs-on }}
    env:
      LOW_LEVEL_RELEASE: sp-vm-low-level-v${{ github.run_number }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure release does not exist
        uses: actions/github-script@v7
        with:
          script: |
            const tag = process.env.LOW_LEVEL_RELEASE;
            const { owner, repo } = context.repo;

            try {
              await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              core.setFailed(`Release ${tag} already exists`);
              return;
            } catch (error) {
              if (error.status !== 404) throw error;
            }

            try {
              await github.rest.git.getRef({ owner, repo, ref: `tags/${tag}` });
              core.setFailed(`Tag ${tag} already exists`);
            } catch (error) {
              if (error.status !== 404) throw error;
            }

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build low-level components
        run: |
          docker buildx build \
            --file src/Dockerfile.low-level \
            --target low_level_export \
            --output type=local,dest=./out \
            src

      - name: Verify artifacts
        working-directory: out
        run: |
          sha256sum --check SHA256SUMS
          test -s vmlinuz
          test -s OVMF.fd
          test -s OVMF_AMD.fd
          test -s OVMF_TDX.fd
          compgen -G 'linux-image*.deb' >/dev/null
          unexpected="$(find . -mindepth 1 ! -type f -print -quit)"
          test -z "$unexpected" || {
            echo "Low-level export must be flat, found: $unexpected" >&2
            exit 1
          }

      - name: Calculate manifest checksum
        working-directory: out
        run: |
          echo "LOW_LEVEL_SHA256SUMS=$(sha256sum SHA256SUMS | awk '{print $1}')" >> "$GITHUB_ENV"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.LOW_LEVEL_RELEASE }}
          path: out/*
          if-no-files-found: error

      - name: Create prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.LOW_LEVEL_RELEASE }}
          name: ${{ env.LOW_LEVEL_RELEASE }}
          target_commitish: ${{ github.sha }}
          draft: false
          prerelease: true
          make_latest: false
          body: |
            Source commit: `${{ github.sha }}`
            SHA256SUMS: `${{ env.LOW_LEVEL_SHA256SUMS }}`
          files: out/*
