<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1160" viewBox="0 0 1440 1160" role="img" aria-labelledby="title desc">
  <title id="title">SEV-SNP measurement data flow</title>
  <desc id="desc">SEV-SNP evidence is cryptographically verified, checked against the security policy, combined with build artifacts from SuperProtocol VM Storage, compared with the reported measurement, and normalized into mrEnclave.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1d4ed8"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="7" stdDeviation="10" flood-color="#0f172a" flood-opacity=".10"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
    <style>
      .title { font: 700 26px Inter, Segoe UI, Arial, sans-serif; fill: #0f172a; }
      .label { font: 650 17px Inter, Segoe UI, Arial, sans-serif; fill: #0f172a; }
      .small { font: 500 14px Inter, Segoe UI, Arial, sans-serif; fill: #475569; }
      .tiny { font: 600 12px Inter, Segoe UI, Arial, sans-serif; fill: #64748b; }
      .flow { fill: none; stroke: #64748b; stroke-width: 2.3; marker-end: url(#arrow); }
      .node { fill: #fff; stroke: #cbd5e1; stroke-width: 1.6; }
      .verify { fill: #eff6ff; stroke: #60a5fa; stroke-width: 1.8; }
      .policy { fill: #fffbeb; stroke: #fbbf24; stroke-width: 1.8; }
      .artifact { fill: #f5f3ff; stroke: #a78bfa; stroke-width: 1.8; }
      .normalize { fill: #f0fdfa; stroke: #2dd4bf; stroke-width: 1.8; }
      .result { fill: #ecfdf5; stroke: #34d399; stroke-width: 2; }
      .reject { fill: #fef2f2; stroke: #f87171; stroke-width: 1.8; }
    </style>
  </defs>

  <rect width="1440" height="1160" rx="24" fill="url(#background)"/>
  <text x="720" y="42" text-anchor="middle" class="title">SEV-SNP measurement data flow</text>

  <g filter="url(#shadow)">
    <rect x="70" y="82" width="1300" height="1040" rx="22" fill="#fff" stroke="#dbeafe" stroke-width="2"/>
    <path d="M92 82 H1348 A22 22 0 0 1 1370 104 V132 H70 V104 A22 22 0 0 1 92 82 Z" fill="url(#header)"/>
  </g>

  <!-- Inputs and trust data -->
  <g>
    <rect x="110" y="170" width="380" height="78" rx="14" class="node"/>
    <text x="300" y="202" text-anchor="middle" class="label">SEV-SNP evidence</text>
    <text x="300" y="225" text-anchor="middle" class="small">Report + build and VM parameters</text>

    <rect x="530" y="170" width="380" height="78" rx="14" class="node"/>
    <text x="720" y="202" text-anchor="middle" class="label">AMD KDS</text>
    <text x="720" y="225" text-anchor="middle" class="small">VCEK, AMD CA chain and CRLs</text>

    <rect x="950" y="170" width="380" height="78" rx="14" class="node"/>
    <text x="1140" y="202" text-anchor="middle" class="label">SuperProtocol VM Storage</text>
    <text x="1140" y="225" text-anchor="middle" class="small">OVMF image + kernel and initrd hashes</text>
  </g>

  <!-- Verification branch -->
  <g>
    <rect x="320" y="310" width="380" height="86" rx="14" class="verify"/>
    <text x="510" y="344" text-anchor="middle" class="label">Cryptographic verification</text>
    <text x="510" y="368" text-anchor="middle" class="small">Validate report and certificate chain</text>

    <path d="M300 248 V278 H430 V308" class="flow"/>
    <path d="M720 248 V278 H590 V308" class="flow"/>

    <rect x="320" y="450" width="380" height="86" rx="14" class="policy"/>
    <text x="510" y="483" text-anchor="middle" class="label">Check TCB and security policy</text>
    <text x="510" y="507" text-anchor="middle" class="small">debugAllowed · ciphertextHiding</text>
    <text x="510" y="526" text-anchor="middle" class="small">pageSwapDisabled · snp</text>
    <path d="M510 396 V448" class="flow"/>
  </g>

  <!-- Build artifact branch -->
  <g>
    <rect x="950" y="380" width="380" height="86" rx="14" class="artifact"/>
    <text x="1140" y="414" text-anchor="middle" class="label">Obtain build artifacts</text>
    <text x="1140" y="438" text-anchor="middle" class="small">Select by evidence build identifier</text>

    <path d="M1140 248 V378" class="flow"/>
  </g>

  <!-- Actual measurement calculation -->
  <g>
    <rect x="500" y="620" width="440" height="92" rx="16" class="verify"/>
    <text x="720" y="655" text-anchor="middle" class="label">Calculate actual launch measurement</text>
    <text x="720" y="680" text-anchor="middle" class="small">OVMF + hashes + evidence parameters</text>

    <path d="M510 536 V578 H620 V618" class="flow"/>
    <path d="M1140 466 V578 H820 V618" class="flow"/>

    <rect x="500" y="770" width="440" height="92" rx="16" class="policy"/>
    <text x="720" y="805" text-anchor="middle" class="label">Compare launch measurement</text>
    <text x="720" y="830" text-anchor="middle" class="small">Calculated value = report MEASUREMENT</text>
    <path d="M720 712 V768" class="flow"/>

    <path d="M110 209 H82 V816 H498" class="flow"/>
    <rect x="98" y="738" width="218" height="40" rx="8" fill="#fff"/>
    <text x="112" y="763" class="tiny">Report MEASUREMENT</text>

    <rect x="1050" y="780" width="250" height="72" rx="14" class="reject"/>
    <text x="1175" y="811" text-anchor="middle" class="label">Reject evidence</text>
    <text x="1175" y="833" text-anchor="middle" class="small">Values do not match</text>
    <path d="M940 816 H1048" class="flow"/>
    <text x="966" y="807" class="tiny">mismatch</text>
  </g>

  <!-- Normalization and result -->
  <g>
    <rect x="500" y="918" width="440" height="90" rx="16" class="normalize"/>
    <text x="720" y="953" text-anchor="middle" class="label">Normalize CPU and vCPU</text>
    <text x="720" y="978" text-anchor="middle" class="small">Canonical CPU signature and one vCPU</text>
    <path d="M720 862 V916" class="flow"/>
    <text x="734" y="890" class="tiny">match</text>

    <rect x="540" y="1042" width="360" height="58" rx="16" class="result"/>
    <text x="720" y="1077" text-anchor="middle" class="label">mrEnclave · 32 bytes</text>
    <path d="M720 1008 V1040" class="flow"/>
  </g>
</svg>
