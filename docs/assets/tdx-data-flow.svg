<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="940" viewBox="0 0 1440 940" role="img" aria-labelledby="title desc">
  <title id="title">TDX measurement data flow</title>
  <desc id="desc">A TDX quote and its RTMR0 event list are verified independently, compared, normalized, and combined into mrEnclave.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1d4ed8"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="7" stdDeviation="10" flood-color="#0f172a" flood-opacity=".10"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
    <style>
      .title { font: 700 26px Inter, Segoe UI, Arial, sans-serif; fill: #0f172a; }
      .label { font: 650 17px Inter, Segoe UI, Arial, sans-serif; fill: #0f172a; }
      .small { font: 500 14px Inter, Segoe UI, Arial, sans-serif; fill: #475569; }
      .tiny { font: 600 12px Inter, Segoe UI, Arial, sans-serif; fill: #64748b; }
      .flow { fill: none; stroke: #64748b; stroke-width: 2.3; marker-end: url(#arrow); }
      .node { fill: #fff; stroke: #cbd5e1; stroke-width: 1.6; }
      .verify { fill: #eff6ff; stroke: #60a5fa; stroke-width: 1.8; }
      .integrity { fill: #fffbeb; stroke: #fbbf24; stroke-width: 1.8; }
      .normalize { fill: #f0fdfa; stroke: #2dd4bf; stroke-width: 1.8; }
      .result { fill: #ecfdf5; stroke: #34d399; stroke-width: 2; }
      .reject { fill: #fef2f2; stroke: #f87171; stroke-width: 1.8; }
    </style>
  </defs>

  <rect width="1440" height="940" rx="24" fill="url(#background)"/>
  <text x="720" y="42" text-anchor="middle" class="title">TDX measurement data flow</text>

  <g filter="url(#shadow)">
    <rect x="70" y="82" width="1300" height="820" rx="22" fill="#fff" stroke="#dbeafe" stroke-width="2"/>
    <path d="M92 82 H1348 A22 22 0 0 1 1370 104 V132 H70 V104 A22 22 0 0 1 92 82 Z" fill="url(#header)"/>
  </g>

  <!-- Inputs -->
  <g>
    <rect x="130" y="170" width="390" height="78" rx="14" class="node"/>
    <text x="325" y="202" text-anchor="middle" class="label">TDX quote</text>
    <text x="325" y="225" text-anchor="middle" class="small">Signed hardware report</text>

    <rect x="920" y="170" width="390" height="78" rx="14" class="node"/>
    <text x="1115" y="202" text-anchor="middle" class="label">RTMR0 event list</text>
    <text x="1115" y="225" text-anchor="middle" class="small">Event type + SHA-384 digest</text>
  </g>

  <!-- Independent verification branches -->
  <g>
    <rect x="130" y="300" width="390" height="86" rx="14" class="verify"/>
    <text x="325" y="334" text-anchor="middle" class="label">DCAP verification</text>
    <text x="325" y="358" text-anchor="middle" class="small">Validate signature and platform state</text>

    <rect x="920" y="300" width="390" height="86" rx="14" class="verify"/>
    <text x="1115" y="334" text-anchor="middle" class="label">Reconstruct RTMR0</text>
    <text x="1115" y="358" text-anchor="middle" class="small">SHA-384(previous RTMR0 || digest)</text>

    <path d="M325 248 V298" class="flow"/>
    <path d="M1115 248 V298" class="flow"/>
  </g>

  <!-- Integrity comparison -->
  <g>
    <rect x="500" y="442" width="440" height="92" rx="16" class="integrity"/>
    <text x="720" y="477" text-anchor="middle" class="label">Compare RTMR0</text>
    <text x="720" y="502" text-anchor="middle" class="small">Reconstructed value = quote value</text>

    <path d="M410 386 V414 H610 V440" class="flow"/>
    <text x="432" y="406" class="tiny">Quote RTMR0</text>

    <path d="M1030 386 V414 H830 V440" class="flow"/>
    <text x="875" y="406" class="tiny">Reconstructed RTMR0</text>

    <rect x="1060" y="452" width="250" height="72" rx="14" class="reject"/>
    <text x="1185" y="483" text-anchor="middle" class="label">Reject evidence</text>
    <text x="1185" y="505" text-anchor="middle" class="small">Values do not match</text>
    <path d="M940 488 H1058" class="flow"/>
    <text x="973" y="479" class="tiny">mismatch</text>
  </g>

  <!-- Normalization and final measurement -->
  <g>
    <rect x="500" y="602" width="440" height="90" rx="16" class="normalize"/>
    <text x="720" y="637" text-anchor="middle" class="label">Normalize RTMR0</text>
    <text x="720" y="662" text-anchor="middle" class="small">Keep firmware blob events from the same list</text>
    <path d="M720 534 V600" class="flow"/>
    <text x="734" y="574" class="tiny">match</text>

    <rect x="420" y="748" width="600" height="92" rx="16" class="verify"/>
    <text x="720" y="782" text-anchor="middle" class="label">Calculate SHA-256</text>
    <text x="720" y="808" text-anchor="middle" class="small">TDATTRIBUTES || MRTD || normalizedRTMR0 || RTMR1 || RTMR2 || RTMR3</text>
    <path d="M720 692 V746" class="flow"/>

    <rect x="540" y="862" width="360" height="58" rx="16" class="result"/>
    <text x="720" y="897" text-anchor="middle" class="label">mrEnclave · 32 bytes</text>
    <path d="M720 840 V860" class="flow"/>
  </g>

  <!-- Verified quote fields use the outer route to avoid crossing the main flow -->
  <path d="M130 343 H100 V794 H418" class="flow"/>
  <rect x="116" y="715" width="268" height="48" rx="8" fill="#fff"/>
  <text x="130" y="735" class="tiny">Verified quote fields:</text>
  <text x="130" y="753" class="tiny">TDATTRIBUTES, MRTD, RTMR1–RTMR3</text>
</svg>
