<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="940" viewBox="0 0 1440 940" role="img" aria-labelledby="title desc">
  <!-- Vendor marks are derived from Simple Icons (CC0-1.0): https://simpleicons.org -->
  <title id="title">Trusted VM attestation architecture</title>
  <desc id="desc">Trust sources provide data for hardware evidence verification and checking trusted VM measurements.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="trustHeader" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6d28d9"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="bootstrapHeader" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#c2410c"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="joiningHeader" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#047857"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0f172a" flood-opacity=".10"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#059669"/>
    </marker>
    <marker id="arrowRegistry" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#7c3aed"/>
    </marker>
    <marker id="arrowHardware" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#ea580c"/>
    </marker>
    <style>
      .title { font: 700 26px Inter, Segoe UI, Arial, sans-serif; fill: #0f172a; }
      .section { font: 700 21px Inter, Segoe UI, Arial, sans-serif; fill: #fff; }
      .label { font: 650 16px Inter, Segoe UI, Arial, sans-serif; fill: #0f172a; }
      .small { font: 500 13px Inter, Segoe UI, Arial, sans-serif; fill: #475569; }
      .tiny { font: 600 12px Inter, Segoe UI, Arial, sans-serif; fill: #64748b; letter-spacing: .02em; }
      .greenTiny { font: 700 10px Inter, Segoe UI, Arial, sans-serif; fill: #047857; letter-spacing: .03em; }
      .orangeTiny { font: 700 10px Inter, Segoe UI, Arial, sans-serif; fill: #c2410c; letter-spacing: .03em; }
      .whiteSmall { font: 600 13px Inter, Segoe UI, Arial, sans-serif; fill: #fff; }
      .node { fill: #fff; stroke: #cbd5e1; stroke-width: 1.5; }
      .bootstrapNode { fill: #fff7ed; stroke: #fb923c; stroke-width: 1.5; }
      .flow { fill: none; stroke: #64748b; stroke-width: 2.2; marker-end: url(#arrow); }
      .orangeFlow { fill: none; stroke: #ea580c; stroke-width: 2.4; marker-end: url(#arrowOrange); }
      .greenFlow { fill: none; stroke: #059669; stroke-width: 2.4; marker-end: url(#arrowGreen); }
      .trustFlow { fill: none; stroke: #7c3aed; stroke-width: 2; marker-end: url(#arrowRegistry); }
      .hardwareInput { fill: none; stroke: #2563eb; stroke-width: 2.3; stroke-dasharray: 8 6; marker-end: url(#arrowHardware); }
      .registryInput { fill: none; stroke: #7c3aed; stroke-width: 2.3; stroke-dasharray: 8 6; marker-end: url(#arrowRegistry); }
      .dash { stroke-dasharray: 7 6; }
    </style>
  </defs>

  <rect width="1440" height="940" rx="24" fill="url(#background)"/>
  <text x="720" y="38" text-anchor="middle" class="title">Trusted VM attestation architecture</text>

  <!-- Trust sources -->
  <g filter="url(#shadow)">
    <rect x="60" y="60" width="1320" height="280" rx="22" fill="#fff" stroke="#ddd6fe" stroke-width="2"/>
    <path d="M82 60 H1358 A22 22 0 0 1 1380 82 V108 H60 V82 A22 22 0 0 1 82 60 Z" fill="url(#trustHeader)"/>
    <text x="90" y="92" class="section">3. Trust sources</text>
  </g>

  <g>
    <rect x="105" y="130" width="220" height="56" rx="12" class="node"/>
    <svg x="130" y="146" width="24" height="24" viewBox="0 0 24 24" aria-label="Intel">
      <path fill="#0071C5" d="M20.42 7.345v9.18h1.651v-9.18zM0 7.475v1.737h1.737V7.474zm9.78.352v6.053c0 .513.044.945.13 1.292.087.34.235.618.44.828.203.21.475.359.803.451.334.093.754.136 1.255.136h.216v-1.533c-.24 0-.445-.012-.593-.037a.672.672 0 0 1-.39-.173.693.693 0 0 1-.173-.377 4.002 4.002 0 0 1-.037-.606v-2.182h1.193v-1.416h-1.193V7.827zm-3.505 2.312c-.396 0-.76.08-1.082.241-.327.161-.6.384-.822.668l-.087.117v-.902H2.658v6.256h1.639v-3.214c.018-.588.16-1.02.433-1.299.29-.297.642-.445 1.044-.445.476 0 .841.149 1.082.433.235.284.359.686.359 1.2v3.324h1.663V12.97c.006-.89-.229-1.595-.686-2.09-.458-.495-1.1-.742-1.917-.742zm10.065.006a3.252 3.252 0 0 0-2.306.946c-.29.29-.525.637-.692 1.033a3.145 3.145 0 0 0-.254 1.273c0 .452.08.878.241 1.274.161.395.39.742.674 1.032.284.29.637.526 1.045.693.408.173.86.26 1.342.26 1.397 0 2.262-.637 2.782-1.23l-1.187-.904c-.248.297-.841.699-1.583.699-.464 0-.847-.105-1.138-.321a1.588 1.588 0 0 1-.593-.872l-.019-.056h4.915v-.587c0-.451-.08-.872-.235-1.267a3.393 3.393 0 0 0-.661-1.033 3.013 3.013 0 0 0-1.02-.692 3.345 3.345 0 0 0-1.311-.248zm-16.297.118v6.256h1.651v-6.256zm16.278 1.286c1.132 0 1.664.797 1.664 1.255l-3.32.006c0-.458.525-1.255 1.656-1.261zm7.073 3.814a.606.606 0 0 0-.606.606.606.606 0 0 0 .606.606.606.606 0 0 0 .606-.606.606.606 0 0 0-.606-.606zm-.008.105a.5.5 0 0 1 .002 0 .5.5 0 0 1 .5.501.5.5 0 0 1-.5.5.5.5 0 0 1-.5-.5.5.5 0 0 1 .498-.5zm-.233.155v.699h.13v-.285h.093l.173.285h.136l-.18-.297a.191.191 0 0 0 .118-.056c.03-.03.05-.074.05-.136 0-.068-.02-.117-.063-.154-.037-.038-.105-.056-.185-.056zm.13.099h.154c.019 0 .037.006.056.012a.064.064 0 0 1 .037.031c.013.013.012.031.012.056a.124.124 0 0 1-.012.055.164.164 0 0 1-.037.031c-.019.006-.037.013-.056.013h-.154Z"/>
    </svg>
    <text x="172" y="163" class="label">Intel PCS</text>

    <rect x="345" y="130" width="220" height="56" rx="12" class="node"/>
    <svg x="370" y="146" width="24" height="24" viewBox="0 0 24 24" aria-label="AMD">
      <path fill="#ED1C24" d="M18.324 9.137l1.559 1.56h2.556v2.557L24 14.814V9.137zM2 9.52l-2 4.96h1.309l.37-.982H3.9l.408.982h1.338L3.432 9.52zm4.209 0v4.955h1.238v-3.092l1.338 1.562h.188l1.338-1.556v3.091h1.238V9.52H10.47l-1.592 1.845L7.287 9.52zm6.283 0v4.96h2.057c1.979 0 2.88-1.046 2.88-2.472 0-1.36-.937-2.488-2.747-2.488zm1.237.91h.792c1.17 0 1.63.711 1.63 1.57 0 .728-.372 1.572-1.616 1.572h-.806zm-10.985.273l.791 1.932H2.008zm17.137.307l-1.604 1.603v2.25h2.246l1.604-1.607h-2.246z"/>
    </svg>
    <text x="412" y="163" class="label">AMD KDS</text>

    <rect x="585" y="130" width="220" height="56" rx="12" class="node"/>
    <svg x="606" y="146" width="24" height="24" viewBox="0 0 24 24" aria-label="NVIDIA">
      <path fill="#76B900" d="M8.948 8.798v-1.43a6.7 6.7 0 0 1 .424-.018c3.922-.124 6.493 3.374 6.493 3.374s-2.774 3.851-5.75 3.851c-.398 0-.787-.062-1.158-.185v-4.346c1.528.185 1.837.857 2.747 2.385l2.04-1.714s-1.492-1.952-4-1.952a6.016 6.016 0 0 0-.796.035m0-4.735v2.138l.424-.027c5.45-.185 9.01 4.47 9.01 4.47s-4.08 4.964-8.33 4.964c-.37 0-.733-.035-1.095-.097v1.325c.3.035.61.062.91.062 3.957 0 6.82-2.023 9.593-4.408.459.371 2.34 1.263 2.73 1.652-2.633 2.208-8.772 3.984-12.253 3.984-.335 0-.653-.018-.971-.053v1.864H24V4.063zm0 10.326v1.131c-3.657-.654-4.673-4.46-4.673-4.46s1.758-1.944 4.673-2.262v1.237H8.94c-1.528-.186-2.73 1.245-2.73 1.245s.68 2.412 2.739 3.11M2.456 10.9s2.164-3.197 6.5-3.533V6.201C4.153 6.59 0 10.653 0 10.653s2.35 6.802 8.948 7.42v-1.237c-4.84-.6-6.492-5.936-6.492-5.936z"/>
    </svg>
    <text x="648" y="163" class="label">NVIDIA NRAS</text>

    <rect x="945" y="187" width="380" height="56" rx="12" fill="#faf5ff" stroke="#c4b5fd" stroke-width="1.5"/>
    <rect x="962" y="201" width="28" height="28" rx="6" fill="#111"/>
    <path d="M967 219h3.2c2 0 3.2-1 3.9-3.1l2.8-8.1c.6-1.9 2-2.8 4-2.8h4.1v4h-2.9c-.8 0-1.3.4-1.6 1.3l-2.8 8.1c-1.1 3.1-3.3 4.6-6.5 4.6H967z" fill="#fff"/>
    <text x="1005" y="220" class="label">Trusted mrEnclave registry</text>

    <rect x="155" y="232" width="600" height="68" rx="14" fill="#eff6ff" stroke="#60a5fa" stroke-width="1.5"/>
    <text x="455" y="272" text-anchor="middle" class="label">Hardware evidence verification</text>

    <path d="M215 186 V205 H335 V230" class="trustFlow"/>
    <path d="M455 186 V230" class="trustFlow"/>
    <path d="M695 186 V205 H575 V230" class="trustFlow"/>
  </g>

  <!-- Bootstrap VM -->
  <g filter="url(#shadow)">
    <rect x="40" y="390" width="620" height="500" rx="22" fill="#fffaf5" stroke="#fed7aa" stroke-width="2"/>
    <path d="M62 390 H638 A22 22 0 0 1 660 412 V452 H40 V412 A22 22 0 0 1 62 390 Z" fill="url(#bootstrapHeader)"/>
    <text x="70" y="426" class="section">1. Bootstrap VM</text>
    <text x="70" y="445" class="whiteSmall">Creates the network trust anchor</text>
  </g>

  <g>
    <rect x="90" y="480" width="520" height="60" rx="14" class="bootstrapNode"/>
    <circle cx="126" cy="510" r="17" fill="#ffedd5"/>
    <text x="126" y="516" text-anchor="middle" class="label" fill="#c2410c">1</text>
    <text x="160" y="504" class="label">Create the PKI hierarchy</text>
    <text x="160" y="526" class="small">Root CA with hardware evidence and subroot CAs</text>

    <rect x="90" y="565" width="520" height="60" rx="14" class="bootstrapNode"/>
    <circle cx="126" cy="595" r="17" fill="#ffedd5"/>
    <text x="126" y="601" text-anchor="middle" class="label" fill="#c2410c">2</text>
    <text x="160" y="601" class="label">Generate the swarm key</text>

    <rect x="90" y="650" width="520" height="60" rx="14" class="bootstrapNode"/>
    <circle cx="126" cy="680" r="17" fill="#ffedd5"/>
    <text x="126" y="686" text-anchor="middle" class="label" fill="#c2410c">3</text>
    <text x="160" y="686" class="label">Bootstrap completed</text>

    <rect x="90" y="735" width="520" height="140" rx="16" fill="#fff7ed" stroke="#fb923c" stroke-width="2"/>
    <text x="350" y="766" text-anchor="middle" class="label">PKI Authority (TEE-PKI)</text>
    <text x="350" y="788" text-anchor="middle" class="small">Verifies joining VMs</text>

    <path d="M350 540 V563" class="orangeFlow"/>
    <path d="M350 625 V648" class="orangeFlow"/>
    <path d="M350 710 V733" class="orangeFlow"/>
  </g>

  <!-- Joining VM -->
  <g filter="url(#shadow)">
    <rect x="780" y="390" width="620" height="500" rx="22" fill="#fff" stroke="#a7f3d0" stroke-width="2"/>
    <path d="M802 390 H1378 A22 22 0 0 1 1400 412 V452 H780 V412 A22 22 0 0 1 802 390 Z" fill="url(#joiningHeader)"/>
    <text x="810" y="426" class="section">2. Joining VM</text>
    <text x="810" y="445" class="whiteSmall">Proves its state before receiving network secrets</text>
  </g>

  <g>
    <rect x="830" y="466" width="520" height="58" rx="14" class="node"/>
    <circle cx="866" cy="495" r="17" fill="#d1fae5"/>
    <text x="866" y="501" text-anchor="middle" class="label" fill="#047857">1</text>
    <text x="900" y="489" class="label">Validate network root CA</text>
    <text x="900" y="511" class="small">Verify embedded evidence and mrEnclave</text>

    <rect x="830" y="554" width="520" height="58" rx="14" class="node"/>
    <circle cx="866" cy="583" r="17" fill="#d1fae5"/>
    <text x="866" y="589" text-anchor="middle" class="label" fill="#047857">2</text>
    <text x="900" y="577" class="label">Create CPU/GPU challenge</text>
    <text x="900" y="599" class="small">Bind the certificate key and GPU token</text>

    <rect x="830" y="642" width="520" height="58" rx="14" class="node"/>
    <circle cx="866" cy="671" r="17" fill="#d1fae5"/>
    <text x="866" y="677" text-anchor="middle" class="label" fill="#047857">3</text>
    <text x="900" y="665" class="label">Request VM certificate</text>
    <text x="900" y="687" class="small">Send the CPU/GPU challenge</text>

    <rect x="830" y="730" width="520" height="58" rx="14" class="node"/>
    <circle cx="866" cy="759" r="17" fill="#d1fae5"/>
    <text x="866" y="765" text-anchor="middle" class="label" fill="#047857">4</text>
    <text x="900" y="753" class="label">Request the swarm key</text>
    <text x="900" y="775" class="small">Authenticate with the VM certificate</text>

    <rect x="830" y="822" width="520" height="58" rx="14" fill="#ecfdf5" stroke="#34d399" stroke-width="2"/>
    <text x="1090" y="856" text-anchor="middle" class="label">Joining successful</text>

    <path d="M1090 524 V552" class="greenFlow"/>
    <path d="M1090 612 V640" class="greenFlow"/>
    <path d="M1090 700 V728" class="greenFlow"/>
    <path d="M1090 788 V820" class="greenFlow"/>
  </g>

  <!-- Trust inputs used by verifiers, never by bootstrap self-verification -->
  <path d="M755 266 H1170 V464" class="hardwareInput"/>
  <path d="M1260 243 V464" class="registryInput"/>
  <path d="M155 266 H20 V805 H88" class="hardwareInput"/>
  <path d="M1325 215 H1420 V915 H350 V877" class="registryInput"/>
  <path d="M570 300 V478" class="hardwareInput"/>

  <!-- Enrollment exchange -->
  <path d="M828 660 H690 V760 H612" class="greenFlow"/>
  <path d="M612 790 H715 V682 H828" class="orangeFlow"/>
  <path d="M828 748 H740 V820 H612" class="greenFlow"/>
  <path d="M612 850 H765 V770 H828" class="orangeFlow"/>

  <text x="750" y="640" text-anchor="middle" class="greenTiny">
    <tspan x="750">CERTIFICATE</tspan>
    <tspan x="750" dy="11">REQUEST</tspan>
  </text>
  <text x="660" y="782" text-anchor="middle" class="orangeTiny">VM CERTIFICATE</text>
  <text x="755" y="728" text-anchor="middle" class="greenTiny">
    <tspan x="755">SWARM KEY</tspan>
    <tspan x="755" dy="11">REQUEST</tspan>
  </text>
  <text x="650" y="842" text-anchor="middle" class="orangeTiny">SWARM KEY</text>
</svg>
